name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds cross-platform binaries, publishes a GitHub Release, and updates the in-repo
# Homebrew formula (Formula/sshare.rb) on main.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            linker: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="sshare-${version}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/sshare" "dist/$name/"
          cp README.md LICENSE CHANGELOG.md "dist/$name/"
          tar -C dist -czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  publish:
    name: publish release + bump formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section for this version out of CHANGELOG.md; fall back to autogen.
          awk -v h="## [$version]" '
            index($0, h) == 1 { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            artifacts/*.tar.gz artifacts/*.tar.gz.sha256

      - name: Regenerate Homebrew formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          sha() { awk '{print $1}' "artifacts/sshare-${version}-$1.tar.gz.sha256"; }
          cat > Formula/sshare.rb <<EOF
          # This file is regenerated on each release by .github/workflows/release.yml.
          class Sshare < Formula
            desc "Share team secrets with SSH keys: encrypt to public keys, decrypt with your private key"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/sshare-${version}-aarch64-apple-darwin.tar.gz"
                sha256 "$(sha aarch64-apple-darwin)"
              end
              on_intel do
                url "${base}/sshare-${version}-x86_64-apple-darwin.tar.gz"
                sha256 "$(sha x86_64-apple-darwin)"
              end
            end

            on_linux do
              on_arm do
                url "${base}/sshare-${version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "$(sha aarch64-unknown-linux-gnu)"
              end
              on_intel do
                url "${base}/sshare-${version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "$(sha x86_64-unknown-linux-gnu)"
              end
            end

            def install
              bin.install "sshare"
            end

            test do
              assert_match "sshare", shell_output("#{bin}/sshare --version")
            end
          end
          EOF

      - name: Commit formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sshare.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "chore: update Homebrew formula for ${GITHUB_REF_NAME} [skip ci]"
            git push origin main
          fi
